components:
  schemas:
    ClassCreate:
      properties:
        name:
          type: string
          maxLength: 255
          minLength: 1
          title: Name
        code:
          type: string
          maxLength: 50
          minLength: 1
          title: Code
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
      type: object
      required:
      - name
      - code
      title: ClassCreate
    ClassDetailResponse:
      properties:
        success:
          type: boolean
          title: Success
          default: true
        data:
          $ref: '#/components/schemas/ClassResponse'
        message:
          type: string
          title: Message
          default: Operation successful
      type: object
      required:
      - data
      title: ClassDetailResponse
    ClassListResponse:
      properties:
        success:
          type: boolean
          title: Success
          default: true
        data:
          items:
            $ref: '#/components/schemas/ClassResponse'
          type: array
          title: Data
        message:
          type: string
          title: Message
          default: Operation successful
      type: object
      required:
      - data
      title: ClassListResponse
    ClassResponse:
      properties:
        id:
          type: integer
          title: Id
        name:
          type: string
          title: Name
        code:
          type: string
          title: Code
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      type: object
      required:
      - id
      - name
      - code
      - description
      - created_at
      - updated_at
      title: ClassResponse
    ClassUpdate:
      properties:
        name:
          anyOf:
          - type: string
            maxLength: 255
            minLength: 1
          - type: 'null'
          title: Name
        code:
          anyOf:
          - type: string
            maxLength: 50
            minLength: 1
          - type: 'null'
          title: Code
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
      type: object
      title: ClassUpdate
    CustomerCreate:
      properties:
        school_id:
          type: integer
          maximum: 999999.0
          minimum: 1.0
          title: School Id
        school_name:
          type: string
          maxLength: 255
          minLength: 1
          title: School Name
        contact_email:
          anyOf:
          - type: string
            format: email
          - type: 'null'
          title: Contact Email
        contact_phone:
          anyOf:
          - type: string
            maxLength: 20
          - type: 'null'
          title: Contact Phone
        address:
          anyOf:
          - type: string
            maxLength: 500
          - type: 'null'
          title: Address
        status:
